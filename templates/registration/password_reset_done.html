{% extends 'base.html' %}

{% block title %}Check your email — Hirely{% endblock %}

{% block content %}
<div class="container" style="max-width:440px;">
    <div class="card p-4 p-md-5 mt-5 text-center">
        <div style="font-size:2.5rem;">📬</div>
        <h2 class="fw-bold mt-3 mb-2">Check your email</h2>
        <p class="text-quiet mb-4">
            If an account exists for that address, we've sent a password reset link.
            Check your inbox (and spam folder, just in case).
        </p>
        <a href="{% url 'login' %}" class="btn btn-outline-primary">Back to login</a>
    </div>
</div>
{% endblock %}
