{% extends 'base.html' %}

{% block title %}Reset Password — Hirely{% endblock %}

{% block content %}
<div class="container" style="max-width:440px;">
    <div class="card p-4 p-md-5 mt-5">
        <h2 class="fw-bold mb-1">Reset your password</h2>
        <p class="text-quiet mb-4" style="font-size:.9rem;">
            Enter the email you signed up with and we'll send a reset link.
        </p>
        <form method="post">
            {% csrf_token %}
            <div class="mb-3">
                <label class="form-label fw-semibold small">Email address</label>
                <input type="email" name="email" class="form-control" placeholder="you@example.com" required autofocus>
            </div>
            <button type="submit" class="btn btn-primary w-100">Send reset link</button>
        </form>
        <p class="text-center text-quiet mt-3 mb-0" style="font-size:.85rem;">
            <a href="{% url 'login' %}">Back to login</a>
        </p>
    </div>
</div>
{% endblock %}
