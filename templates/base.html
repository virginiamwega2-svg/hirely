<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Hirely{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        /* ── Design tokens ─────────────────────────────────────────── */
        :root {
            --bg:        #fafaf8;   /* warm off-white — calmer than grey */
            --card-bg:   #ffffff;
            --border:    #ebebea;
            --shadow-sm: 0 2px 8px rgba(0,0,0,.06);
            --shadow-md: 0 4px 16px rgba(0,0,0,.09);
            --text:      #1c1c1e;
            --muted:     #6b6b6b;
            --radius:    12px;
            --primary:   #2563eb;
        }

        /* ── Base ─────────────────────────────────────────────────── */
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            font-size: 1rem;
            line-height: 1.65;
            -webkit-font-smoothing: antialiased;
        }

        /* ── Navbar — white, light border, no dark slab ───────────── */
        .navbar {
            background: #fff !important;
            border-bottom: 1px solid var(--border);
            padding-top: 14px;
            padding-bottom: 14px;
        }
        .navbar-brand {
            font-size: 1.3rem;
            font-weight: 700;
            color: var(--primary) !important;
            letter-spacing: -.3px;
        }
        .nav-link {
            color: #444 !important;
            font-weight: 500;
            font-size: 0.9rem;
        }
        .nav-link:hover { color: var(--primary) !important; }
        .navbar-toggler { border: 1px solid var(--border); }

        /* ── Hero ─────────────────────────────────────────────────── */
        .hero {
            background: linear-gradient(135deg, #3b6ff0 0%, #30b8df 100%);
            color: white;
            padding: 52px 0;           /* tighter on mobile */
        }
        @media (min-width: 768px) {
            .hero { padding: 80px 0; }
        }

        /* ── Cards — no lift animation, just a shadow change ──────── */
        .card {
            border: 1px solid var(--border);
            border-radius: var(--radius);
            box-shadow: var(--shadow-sm);
            background: var(--card-bg);
        }
        .job-card {
            transition: box-shadow .15s ease;
            cursor: pointer;
        }
        .job-card:hover {
            box-shadow: var(--shadow-md);
            /* no translateY — movement is distracting while scanning */
        }

        /* ── Filter chips — horizontal scroll on mobile ───────────── */
        .chip-row {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none;           /* Firefox */
            padding-bottom: 4px;
        }
        .chip-row::-webkit-scrollbar { display: none; } /* Chrome/Safari */
        .flex-chip {
            font-size: 0.82rem;
            border-radius: 999px;
            padding: 7px 16px;
            font-weight: 500;
            white-space: nowrap;
            flex-shrink: 0;
        }

        /* ── Buttons — generous touch targets ─────────────────────── */
        .btn { min-height: 44px; font-weight: 500; border-radius: 8px; }
        .btn-sm { min-height: 36px; font-size: 0.85rem; }
        .btn-primary {
            background: var(--primary);
            border-color: var(--primary);
        }
        .btn-primary:hover, .btn-primary:focus {
            background: #1d4ed8;
            border-color: #1d4ed8;
        }

        /* ── Typography helpers ────────────────────────────────────── */
        .text-quiet { color: var(--muted); }
        .label-sm {
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: .06em;
            color: var(--muted);
        }

        /* ── Schedule-type category cards ─────────────────────────── */
        .schedule-card {
            border-radius: var(--radius);
            border: 1px solid var(--border);
            background: var(--card-bg);
            padding: 18px;
            display: flex;
            align-items: center;
            gap: 14px;
            transition: box-shadow .15s;
            text-decoration: none;
            color: inherit;
        }
        .schedule-card:hover {
            box-shadow: var(--shadow-md);
            color: inherit;
        }
        .schedule-icon {
            width: 46px;
            height: 46px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            flex-shrink: 0;
        }

        /* ── Badges ────────────────────────────────────────────────── */
        .badge { font-weight: 500; border-radius: 6px; }

        /* ── Forms ─────────────────────────────────────────────────── */
        .form-control, .form-select {
            border-color: var(--border);
            border-radius: 8px;
            min-height: 44px;
        }
        .form-control:focus, .form-select:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(37,99,235,.12);
        }

        /* ── Upload zone ───────────────────────────────────────────── */
        .upload-zone {
            border: 2px dashed var(--border);
            border-radius: var(--radius);
            padding: 32px 20px;
            text-align: center;
            background: #f7f9ff;
            transition: border-color .15s;
        }
        .upload-zone:hover { border-color: var(--primary); }
        .upload-zone input[type=file] { display: none; }

        /* ── Progress step indicator ───────────────────────────────── */
        .step-pill {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: #eef2ff;
            color: var(--primary);
            border-radius: 999px;
            padding: 4px 14px;
            font-size: 0.8rem;
            font-weight: 600;
        }

        /* ── Footer — light, not heavy dark slab ──────────────────── */
        footer {
            background: #fff;
            border-top: 1px solid var(--border);
            color: var(--muted);
        }
        footer a { color: var(--muted); text-decoration: none; }
        footer a:hover { color: var(--primary); }
    </style>
</head>
<body>

    <!-- Navbar: white, minimal, max 2 nav items visible -->
    <nav class="navbar navbar-expand-lg">
        <div class="container">
            <a class="navbar-brand" href="{% url 'home' %}">
                <i class="bi bi-heart-pulse-fill"></i> Hirely
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
                    aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'job_list' %}">Find a Role</a>
                    </li>
                </ul>
                <ul class="navbar-nav ms-auto align-items-center gap-1">
                    {% if user.is_authenticated %}
                        <li class="nav-item">
                            <a class="nav-link" href="{% url 'my_applications' %}">My Jobs</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="{% url 'employer_dashboard' %}">Dashboard</a>
                        </li>
                        <li class="nav-item ms-2">
                            <a class="btn btn-sm btn-outline-secondary" href="{% url 'logout' %}">Sign Out</a>
                        </li>
                    {% else %}
                        <li class="nav-item">
                            <a class="nav-link" href="{% url 'login' %}">Log In</a>
                        </li>
                        <li class="nav-item ms-2">
                            <a class="btn btn-primary btn-sm px-4" href="{% url 'register' %}">Get Started</a>
                        </li>
                    {% endif %}
                </ul>
            </div>
        </div>
    </nav>

    <!-- Flash messages -->
    <div class="container mt-3">
        {% for message in messages %}
            <div class="alert alert-{{ message.tags }} alert-dismissible fade show border-0 shadow-sm" role="alert"
                 style="border-radius: var(--radius);">
                {{ message }}
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>
        {% endfor %}
    </div>

    <main>
        {% block content %}{% endblock %}
    </main>

    <!-- Footer: light, minimal -->
    <footer class="py-4 mt-5">
        <div class="container text-center">
            <a class="navbar-brand text-quiet mb-1 d-inline-block" href="{% url 'home' %}">
                <i class="bi bi-heart-pulse-fill text-primary"></i>
                <span class="fw-bold" style="color:var(--primary)">Hirely</span>
            </a>
            <p class="small mb-0" style="color:var(--muted)">
                Flexible jobs for busy parents &nbsp;&middot;&nbsp; &copy; 2025
            </p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Upload zone interaction -->
    <script>
    document.querySelectorAll('.upload-zone').forEach(zone => {
        const input = zone.querySelector('input[type=file]');
        const label = zone.querySelector('.upload-label');
        zone.addEventListener('click', () => input && input.click());
        if (input) {
            input.addEventListener('change', () => {
                if (label && input.files[0]) {
                    label.textContent = input.files[0].name;
                    zone.style.borderColor = 'var(--primary)';
                    zone.style.background = '#eef2ff';
                }
            });
        }
        ['dragover','dragenter'].forEach(e =>
            zone.addEventListener(e, ev => { ev.preventDefault(); zone.style.borderColor = 'var(--primary)'; })
        );
        ['dragleave','drop'].forEach(e =>
            zone.addEventListener(e, ev => { ev.preventDefault(); zone.style.borderColor = ''; })
        );
    });
    </script>
</body>
</html>
