services:
  - type: web
    name: hirely
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python manage.py migrate && python manage.py collectstatic --noinput && gunicorn hirely.wsgi --bind 0.0.0.0:$PORT --log-file -
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: hirely.onrender.com
      - key: DATABASE_URL
        fromDatabase:
          name: hirely-db
          property: connectionString
      - key: EMAIL_BACKEND
        value: django.core.mail.backends.console.EmailBackend
      - key: PYTHON_VERSION
        value: "3.12.0"

databases:
  - name: hirely-db
    databaseName: hirely
    user: hirely
